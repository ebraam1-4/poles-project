<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة تخص سيكشن تعريف بولس الرسول</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #fff;
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 95%;
            max-width: 450px;
            text-align: center;
        }

        h2 { color: #8b4513; margin-bottom: 10px; }

        /* شريط التقدم */
        .progress-container {
            height: 8px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        #bar {
            height: 100%;
            background: #d4af37;
            width: 0%;
            border-radius: 10px;
            transition: 0.4s;
        }

        /* لوحة البازل - شبكة 3 أعمدة في 4 صفوف */
        .puzzle-board {
            position: relative;
            width: 270px;
            height: 360px;
            margin: 0 auto 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(4, 1fr);
            border: 4px solid #5d4037;
            background-image: url('poles.jpg');
            background-size: cover;
            border-radius: 5px;
        }

        .piece {
            background-color: #4e342e;
            border: 1px solid #3e2723;
            color: #d4af37;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            transition: all 0.5s ease-in-out;
        }

        .revealed {
            opacity: 0;
            transform: scale(0.1) rotate(45deg);
            pointer-events: none;
        }

        /* الأسئلة */
        .quiz-box { min-height: 200px; }
        #q-text { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; display: block; }

        .btn-list { display: grid; gap: 10px; }
        .ans-btn {
            padding: 12px;
            border: 2px solid #8b4513;
            background: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }
        .ans-btn:hover { background: #8b4513; color: white; }

        .hidden { display: none; }
        .win-screen { color: #2e7d32; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>تعالي نجمع صورة القديس بولس الرسول</h2>
    <div class="progress-container"><div id="bar"></div></div>

    <div class="puzzle-board" id="board">
        </div>

    <div id="quiz-ui">
        <span id="q-text">جاري التحميل...</span>
        <div class="btn-list" id="btns"></div>
    </div>

    <div id="win-ui" class="hidden win-screen">
        <h3>عاش يا صديقي كملت الصورة كلها برافوا عليك 🎉</h3>
        <button class="ans-btn" style="width:100%" onclick="location.reload()">العب تاني</button>
    </div>
</div>

<script>
    const questions = [
        { q: "بولس الرسول اتولد في مدينة إيه؟", a: ["أورشليم", "طرسوس", "دمشق"], c: 1 },
        { q: "كان اسمه إيه قبل ما يبقى مسيحي؟", a: ["شاول", "سمعان", "متى"], c: 0 },
        { q: "كان بيشتغل شغلانة إيه بإيده؟", a: ["نجار", "صياد سمك", "صانع خيام"], c: 2 },
        { q: "مين اللي عَمّده وحط إيده عليه عشان يفتح؟", a: ["حنانيا", "بطرس", "برنابا"], c: 0 },
        { q: "شاف النور وهو رايح لمدينة إيه؟", a: ["روما", "دمشق", "أثينا"], c: 1 },
        { q: "كتب كام رسالة في العهد الجديد؟", a: ["10 رسائل", "12 رسالة", "14 رسالة"], c: 2 },
        { q: "مين كان رفيقه في أول رحلة تبشيرية؟", a: ["برنابا", "لوقا", "تيموثاوس"], c: 0 },
        { q: "اتسجن هو ومين وفضلوا يسبحوا لغاية ما السجن اتهز؟", a: ["مرقس", "سيلا", "اسطفانوس"], c: 1 },
        { q: "كان لقبه إيه المشهور بيه؟", a: ["رسول الأمم", "حبيب الرب", "ابن الرعد"], c: 0 },
        { q: "مين التلميذ اللي بولس قاله 'لا يستهن أحد بحداثتك'؟", a: ["تيطس", "تيموثاوس", "فليمون"], c: 1 },
        { q: "بولس الرسول كان معاه جنسية إيه بجانب إنه يهودي؟", a: ["يونانية", "رومانية", "مصرية"], c: 1 },
        { q: "استشهد في مدينة إيه؟", a: ["روما", "الأسكندرية", "أنطاكية"], c: 0 },
        { q: "آخر سؤال: بولس الرسول استشهد بقطع الرأس ولا بالصلب؟", a: ["بالصلب", "بقطع الرأس", "بالرجم"], c: 1 }
    ];

    let currentQ = 0;

    // رسم قطع البازل (12 قطعة بس عشان التقسيمة)
    const board = document.getElementById('board');
    for (let i = 0; i < 12; i++) {
        const p = document.createElement('div');
        p.className = 'piece';
        p.id = 'p-' + i;
        p.innerText = i + 1;
        board.appendChild(p);
    }

    function loadQ() {
        const data = questions[currentQ];
        document.getElementById('q-text').innerText = data.q;
        const btnContainer = document.getElementById('btns');
        btnContainer.innerHTML = '';
        
        data.a.forEach((option, idx) => {
            const b = document.createElement('button');
            b.className = 'ans-btn';
            b.innerText = option;
            b.onclick = () => check(idx);
            btnContainer.appendChild(b);
        });

        document.getElementById('bar').style.width = (currentQ / questions.length * 100) + '%';
    }

    function check(idx) {
        if (idx === questions[currentQ].c) {
            // لو الإجابة صح، شيل قطعة من الـ 12
            if (currentQ < 12) {
                document.getElementById('p-' + currentQ).classList.add('revealed');
            }
            
            currentQ++;

            if (currentQ < questions.length) {
                loadQ();
            } else {
                document.getElementById('quiz-ui').classList.add('hidden');
                document.getElementById('win-ui').classList.remove('hidden');
                document.getElementById('bar').style.width = '100%';
            }
        } else {
            alert("بأمانة !!! انا قولتلك كده !؟ متكسفنيش و حاول تاني ");
        }
    }

    loadQ();
</script>

</body>
</html>
